services:
  - type: web
    name: excalibur-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    buildFilter:
      paths:
        - frontend/**
        - render.frontend.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
