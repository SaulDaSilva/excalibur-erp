services:
  db:
    image: postgres:16-alpine
    container_name: excalibur_internal_db
    restart: unless-stopped
    env_file:
      - ./backend/.env.internal
    volumes:
      - excalibur_internal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: excalibur_internal_app
    restart: unless-stopped
    env_file:
      - ./backend/.env.internal
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:10000:10000"

volumes:
  excalibur_internal_db_data:
