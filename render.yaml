databases:
  - name: excalibur-db
    databaseName: excalibur_erp
    user: excalibur
    plan: starter

services:
  - type: web
    name: excalibur-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: python -m gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker
    healthCheckPath: /api/auth/csrf/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: excalibur-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DJANGO_ENABLE_ADMIN
        value: "true"
      - key: DJANGO_ADMIN_URL
        sync: false
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "true"
    buildFilter:
      paths:
        - backend/**
        - render.yaml
