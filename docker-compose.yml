services:
  db:
    image: postgres:16-alpine
    container_name: excalibur_db
    restart: unless-stopped
    env_file:
      - ./docker/postgres/.env.db
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - excalibur_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  excalibur_db_data: