databases:
  - name: excalibur-db
    databaseName: excalibur_erp
    user: excalibur
    plan: starter

services:
  - type: web
    name: excalibur-app
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/auth/csrf/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: excalibur-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_SERVE_FRONTEND
        value: "true"
      - key: DJANGO_ENABLE_ADMIN
        value: "true"
      - key: DJANGO_ADMIN_URL
        sync: false
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "false"
    buildFilter:
      paths:
        - backend/**
        - frontend/**
        - docker/render/**
        - Dockerfile
        - .dockerignore
        - render.same-origin.yaml
